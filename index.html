<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eid Salami 🎉</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(circle at center, #1b1b2f, #000000);
      min-height: 100vh;
      font-family: 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      overflow: hidden;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 0.2rem;
      text-align: center;
      background: linear-gradient(45deg, #f7c948, #ffffff, #f7c948);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(247, 201, 72, 0.4);
    }

    .subtitle { 
      color: #888; 
      margin-bottom: 2rem; 
      font-size: 1.1rem; 
      text-align: center; 
      max-width: 80%;
      font-style: italic;
    }

    .wheel-outer {
      position: relative;
      padding: 15px;
      background: #222;
      border-radius: 50%;
      box-shadow: 0 0 60px rgba(0,0,0,1), inset 0 0 30px rgba(255,255,255,0.05);
      border: 5px solid #333;
      transition: transform 0.3s;
    }

    .wheel-container { position: relative; width: 340px; height: 340px; }
    canvas { border-radius: 50%; border: 2px solid #444; }

    .pointer {
      position: absolute;
      top: -15px; left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 38px solid #f7c948;
      filter: drop-shadow(0 0 10px #f7c948);
      z-index: 100;
    }

    #spinBtn {
      margin-top: 2rem;
      padding: 1.2rem 3.5rem;
      font-size: 1.4rem;
      font-weight: 900;
      text-transform: uppercase;
      background: linear-gradient(135deg, #f7c948, #ff6b6b);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: white;
      box-shadow: 0 8px 25px rgba(247, 201, 72, 0.4);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #spinBtn:hover:not(:disabled) { transform: scale(1.1) translateY(-3px); box-shadow: 0 12px 35px rgba(247, 201, 72, 0.6); }
    #spinBtn:active { transform: scale(0.95); }
    #spinBtn:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }

    #result {
      margin-top: 1.5rem;
      font-size: 1.2rem;
      font-weight: bold;
      height: 3rem;
      text-align: center;
      padding: 0 20px;
    }

    #redeemBtn {
      display: none;
      margin-top: 1rem;
      padding: 0.8rem 2.5rem;
      background: #00ffcc;
      color: #000;
      font-weight: 800;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      animation: pulse 1.5s infinite;
    }

    .stats { margin-top: 1.5rem; font-size: 0.85rem; color: #666; font-family: monospace; }

    /* Modal Styling */
    #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    #modal.show { display: flex; }
    .modal-box { 
      background: #0a0a0a; 
      border: 2px solid #f7c948; 
      padding: 2rem; 
      border-radius: 25px; 
      text-align: center; 
      max-width: 450px; 
      width: 100%; 
      box-shadow: 0 0 50px rgba(247,201,72,0.1); 
    }
    
    #modalMemeImg { width: 100%; max-height: 280px; object-fit: contain; margin-bottom: 1rem; border-radius: 15px; display: none; border: 1px solid #333; }
    .yt-wrapper { display: none; position: relative; width: 100%; padding-bottom: 56.25%; margin-bottom: 1rem; border-radius: 15px; overflow: hidden; }
    .yt-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(0, 255, 204, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); } }
    .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }

    #closeModal { margin-top: 1rem; padding: 12px 35px; border-radius: 50px; border: none; cursor:pointer; background:#f7c948; font-weight: 900; color: #000; }
  </style>
</head>
<body>

  <h1>🎉 EID SALAMI 🎉</h1>
  <p class="subtitle" id="subText">Where your dreams come to die. Gently.</p>

  <div class="wheel-outer" id="mainStage">
    <div class="pointer"></div>
    <div class="wheel-container">
      <canvas id="wheelCanvas" width="340" height="340"></canvas>
    </div>
  </div>

  <button id="spinBtn">🎰 DONATE MY LUCK</button>
  <div id="result"></div>
  <button id="redeemBtn">💰 COLLECT IMAGINARY CASH</button>
  
  <div class="stats">
    NET WORTH INCREASE: <span id="wealth">0</span>৳ | DISAPPOINTMENT LEVEL: <span id="sadness">LOW</span>
  </div>

  <div id="modal">
    <div class="modal-box">
      <div id="modalEmoji" style="font-size: 4rem; margin-bottom: 1rem;"></div>
      <h2 style="color:#f7c948; margin-bottom: 1rem; font-size: 1.8rem;" id="modalTitle"></h2>
      <div id="memeLoading" style="font-size: 0.9rem; color:#f7c948; margin-bottom: 10px; font-weight: bold;"></div>
      <img id="modalMemeImg" alt="meme" />
      <div class="yt-wrapper" id="ytWrapper">
        <iframe id="ytFrame" allow="autoplay; encrypted-media"></iframe>
      </div>
      <p id="modalMsg" style="margin-bottom: 2rem; color: #aaa; line-height: 1.6;"></p>
      <button id="closeModal">ACCEPT DEFEAT</button>
    </div>
  </div>

  <script>
    const segments = [
      { label: "0৳", color: "#d00000", zero: true },
      { label: "10৳", color: "#0077b6", zero: false },
      { label: "0৳", color: "#d00000", zero: true },
      { label: "100৳", color: "#2d6a4f", zero: false },
      { label: "0৳", color: "#d00000", zero: true },
      { label: "500৳", color: "#5a189a", zero: false },
      { label: "0৳", color: "#d00000", zero: true },
      { label: "1000৳", color: "#e85d04", zero: false },
      { label: "0৳", color: "#d00000", zero: true },
      { label: "50৳", color: "#00b4d8", zero: false },
      { label: "0৳", color: "#d00000", zero: true },
      { label: "5000৳", color: "#ffb703", zero: false },
    ];

    const roasts = [
      "Still trying? That's cute.",
      "Your electricity bill is now higher than your winnings.",
      "Checking your luck... Status: Not Found.",
      "Maybe the wheel just doesn't like your face?",
      "Go study. It's more profitable than this.",
      "Even a broken clock is right twice. You? Not so much.",
      "You're making the '0' segment feel very popular."
    ];

    const zeroMessages = [
      "0৳ — Your bank account called. It's laughing. 😂",
      "Congratulations! You won a whole lot of nothing. 🎉",
      "Zero. Match made in heaven with your wallet. 👏",
      "The wheel has spoken. It said: 'Please stop.' 🛑",
      "Wow, a zero! You're consistently failing. Remarkable. 🫡",
      "0৳! Technically, that's an infinite percentage of your net worth. 🧮",
      "The wheel: A mirror of your financial future. 🪞",
      "Zero! Even the wheel is broke this Eid. 💀",
      "Congratulations on participating! That's it. No prize. 🏅",
      "Plot twist: You got zero. Shocking. 😐",
      "0৳! Go ask your younger cousin for a loan. 👶",
      "The wheel is honest even when your relatives aren't. 🧿"
    ];

    const redeemTexts = [
      { emoji: "🤡", title: "Honk Honk!", msg: "You actually thought we had money? We're an AI, we live on electricity and your tears." },
      { emoji: "💀", title: "Transaction Yeeted!", msg: "Your request has been reviewed and respectfully thrown into the sun." },
      { emoji: "🤣", title: "Processing...", msg: "Error 404: Salami not found. Have you tried being born into a richer family?" },
      { emoji: "📵", title: "Signal Lost!", msg: "Your internet is too poor to receive wealth. Go sit near the router." },
      { emoji: "🪄", title: "Magic!", msg: "Watch closely... your prize just vanished into thin air! Amazing!" },
      { emoji: "😭", title: "Payment Failed!", msg: "We tried to send it, but your bank said: 'Who is this beggar?'" },
      { emoji: "👻", title: "Ghosted!", msg: "The server saw your profile picture and decided to stop responding." },
      { emoji: "🧟", title: "Dead End!", msg: "This button is purely decorative. Like your gym membership." },
      { emoji: "🤫", title: "Top Secret!", msg: "You won! But it's a secret so we can't actually give it to you." }
    ];

    let spinCount = 0;
    let mediaItems = [];
    fetch('memes/list.json').then(r => r.json()).then(l => mediaItems = l).catch(() => {});

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const arc = (2 * Math.PI) / segments.length;
    let currentAngle = 0;

    function drawWheel() {
      ctx.clearRect(0,0,340,340);
      segments.forEach((s, i) => {
        const ang = currentAngle + i * arc;
        ctx.beginPath();
        ctx.fillStyle = s.color;
        ctx.moveTo(170, 170);
        ctx.arc(170, 170, 165, ang, ang + arc);
        ctx.fill();
        ctx.save();
        ctx.translate(170, 170);
        ctx.rotate(ang + arc/2);
        ctx.textAlign = "right";
        ctx.fillStyle = "white";
        ctx.font = "900 15px Arial";
        ctx.fillText(s.label, 155, 5);
        ctx.restore();
      });
      // Center Circle
      ctx.beginPath();
      ctx.arc(170,170,15,0,Math.PI*2);
      ctx.fillStyle = "#222";
      ctx.fill();
      ctx.strokeStyle = "#f7c948";
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    drawWheel();

    document.getElementById('spinBtn').onclick = function() {
      spinCount++;
      this.disabled = true;
      document.getElementById('result').textContent = "";
      document.getElementById('redeemBtn').style.display = "none";
      document.getElementById('subText').textContent = roasts[spinCount % roasts.length];
      document.getElementById('sadness').textContent = spinCount > 5 ? "MAXIMUM" : "MEDIUM";

      // 55% Zero Probability
      const isZero = Math.random() < 0.55; 
      const pool = segments.map((s,i) => s.zero === isZero ? i : -1).filter(i => i !== -1);
      const chosen = pool[Math.floor(Math.random() * pool.length)];

      // Near-Miss: Stop on the very edge of a winning segment to be extra mean
      const offset = isZero ? (Math.random() < 0.5 ? 0.02 : 0.98) : 0.5;
      const targetRot = (3 * Math.PI / 2) - (chosen * arc + (arc * offset));
      const finalRot = targetRot + (Math.PI * 2 * 10);

      const start = performance.now();
      const duration = 5000;

      function frame(now) {
        const p = Math.min((now - start) / duration, 1);
        const ease = 1 - Math.pow(1 - p, 5); // extra smooth ease
        currentAngle = ease * finalRot;
        drawWheel();
        if (p < 1) requestAnimationFrame(frame);
        else {
          document.getElementById('spinBtn').disabled = false;
          const res = segments[chosen];
          if (res.zero) {
            document.getElementById('mainStage').classList.add('shake');
            setTimeout(() => document.getElementById('mainStage').classList.remove('shake'), 500);
            document.getElementById('result').textContent = zeroMessages[Math.floor(Math.random() * zeroMessages.length)];
            document.getElementById('result').style.color = "#ff6b6b";
          } else {
            document.getElementById('result').textContent = `🔥 LANDED ON ${res.label}! 🔥`;
            document.getElementById('result').style.color = "#00ffcc";
            document.getElementById('redeemBtn').style.display = "inline-block";
          }
        }
      }
      requestAnimationFrame(frame);
    };

    document.getElementById('redeemBtn').onclick = function() {
      const text = redeemTexts[Math.floor(Math.random() * redeemTexts.length)];
      const media = mediaItems.length ? mediaItems[Math.floor(Math.random() * mediaItems.length)] : null;

      document.getElementById('modalEmoji').textContent = text.emoji;
      document.getElementById('modalTitle').textContent = text.title;
      document.getElementById('modalMsg').textContent = text.msg;
      
      const img = document.getElementById('modalMemeImg');
      const yt = document.getElementById('ytWrapper');
      const loading = document.getElementById('memeLoading');
      
      img.style.display = 'none';
      yt.style.display = 'none';
      loading.textContent = "";

      if (media) {
        if (media.type === 'image') {
          loading.textContent = "GENREATING DISAPPOINTMENT...";
          img.src = 'memes/' + media.file;
          img.onload = () => { loading.textContent = ""; img.style.display = 'block'; };
        } else if (media.type === 'youtube') {
          const vid = media.url.split('v=')[1] || media.url.split('/').pop();
          document.getElementById('ytFrame').src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
          yt.style.display = 'block';
        }
      }
      document.getElementById('modal').classList.add('show');
    };

    document.getElementById('closeModal').onclick = () => {
      document.getElementById('ytFrame').src = "";
      document.getElementById('modal').classList.remove('show');
    };
  </script>
</body>
</html>
