<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eid Salami 🎉</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(135deg, #1a0a2e, #16213e, #0f3460);
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      overflow: hidden;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.3rem;
      text-align: center;
      background: linear-gradient(to right, #f7c948, #ff6b6b, #f7c948);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.4); }
    }

    .subtitle { color: #aaa; margin-bottom: 2rem; font-size: 1rem; text-align: center; }

    .wheel-container {
      position: relative;
      width: 340px; height: 340px;
      margin-bottom: 1.5rem;
    }

    canvas { border-radius: 50%; box-shadow: 0 0 40px rgba(247,201,72,0.4); }

    .pointer {
      position: absolute;
      top: -18px; left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 32px solid #f7c948;
      filter: drop-shadow(0 2px 6px rgba(247,201,72,0.7));
      z-index: 10;
    }

    #spinBtn {
      padding: 1rem 3rem;
      font-size: 1.3rem;
      font-weight: bold;
      background: linear-gradient(135deg, #f7c948, #ff6b6b);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: white;
      box-shadow: 0 6px 25px rgba(247,201,72,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 1px;
    }
    #spinBtn:hover { transform: scale(1.05); }
    #spinBtn:active { transform: scale(0.97); }
    #spinBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    #result {
      margin-top: 1.5rem;
      font-size: 1.1rem;
      text-align: center;
      min-height: 3rem;
      max-width: 360px;
      padding: 0 1rem;
      color: #f7c948;
      font-style: italic;
      opacity: 0;
      transition: opacity 0.5s;
    }

    #redeemBtn {
      display: none;
      margin-top: 1rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      font-weight: bold;
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: #111;
      box-shadow: 0 4px 15px rgba(67,233,123,0.4);
      transition: transform 0.1s;
    }
    #redeemBtn:hover { transform: scale(1.05); }

    /* Modal */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 1rem;
    }
    #modal.show { display: flex; }

    .modal-box {
      background: linear-gradient(135deg, #1a0a2e, #0f3460);
      border: 2px solid #f7c948;
      border-radius: 20px;
      padding: 2rem 1.5rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 60px rgba(247,201,72,0.3);
      animation: popIn 0.4s ease;
      max-height: 90vh;
      overflow-y: auto;
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      80% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    .modal-emoji { font-size: 3rem; margin-bottom: 0.5rem; }
    .modal-title { font-size: 1.4rem; font-weight: bold; color: #f7c948; margin-bottom: 0.8rem; }

    #modalMemeImg {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: 12px;
      margin-bottom: 1rem;
      display: none;
      border: 2px solid rgba(247,201,72,0.3);
    }

    .yt-wrapper {
      display: none;
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      margin-bottom: 1rem;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid rgba(247,201,72,0.3);
    }
    .yt-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    #ytLinkBtn {
      display: none;
      margin-bottom: 1rem;
      padding: 0.7rem 1.5rem;
      background: linear-gradient(135deg, #ff0000, #cc0000);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(255,0,0,0.4);
      transition: transform 0.1s;
    }

    .modal-msg { font-size: 0.95rem; color: #ccc; line-height: 1.5; margin-bottom: 1.5rem; }
    .meme-loading { color: #aaa; font-size: 0.85rem; margin-bottom: 0.5rem; font-style: italic; }

    #closeModal {
      padding: 0.6rem 2rem;
      background: #f7c948;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      color: #111;
      font-size: 1rem;
    }

    .stars {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: -1;
    }
  </style>
</head>
<body>

<canvas class="stars" id="stars"></canvas>

  <h1>🎉 Eid Salami 🎉</h1>
  <p class="subtitle">Spin the wheel. Win big. (Or get roasted.)</p>

  <div class="wheel-container">
    <div class="pointer"></div>
    <canvas id="wheelCanvas" width="340" height="340"></canvas>
  </div>

  <button id="spinBtn">🎰 SPIN!</button>
  <div id="result"></div>
  <button id="redeemBtn">💰 Redeem Now!</button>

  <div id="modal">
    <div class="modal-box">
      <div class="modal-emoji" id="modalEmoji"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="meme-loading" id="memeLoading"></div>
      <img id="modalMemeImg" alt="meme" />
      <div class="yt-wrapper" id="ytWrapper">
        <iframe id="ytFrame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
      </div>
      <button id="ytLinkBtn">▶️ Watch on YouTube</button>
      <div class="modal-msg" id="modalMsg"></div>
      <button id="closeModal">Try Again 🔄</button>
    </div>
  </div>

  <script>
    const segments = [
      { label: "0৳",    color: "#e74c3c", zero: true  },
      { label: "10৳",   color: "#3498db", zero: false },
      { label: "0৳",    color: "#e74c3c", zero: true  },
      { label: "100৳",  color: "#2ecc71", zero: false },
      { label: "0৳",    color: "#e74c3c", zero: true  },
      { label: "500৳",  color: "#9b59b6", zero: false },
      { label: "0৳",    color: "#e74c3c", zero: true  },
      { label: "1000৳", color: "#f39c12", zero: false },
      { label: "0৳",    color: "#e74c3c", zero: true  },
      { label: "50৳",   color: "#1abc9c", zero: false },
      { label: "0৳",    color: "#e74c3c", zero: true  },
      { label: "5000৳", color: "#e67e22", zero: false },
    ];

    const zeroMessages = [
      "Zero! Even the wheel is broke this Eid. 💀",
      "Congratulations! You won the gift of disappointment. 🎉",
      "0৳ — Go ask your older brother instead. 😂",
      "Wow, zero! Your luck is actually impressive in a bad way. 👏",
      "The wheel spoke. It said: 'In your dreams.' 😴",
      "Zero Taka. But the experience was priceless, right? (No.) 😐",
      "Plot twist: You got nothing. 📺",
      "Your bank account is still crying. 0৳. 💸"
    ];

    const redeemTexts = [
      { emoji: "😂", title: "Nice Try!", msg: "Transaction failed. Our bank is currently on vacation in Bali." },
      { emoji: "💀", title: "Error 404", msg: "Money not found. We checked under the sofa, nothing there." },
      { emoji: "🤣", title: "Wait for it...", msg: "Processing... processing... yeah, you're not getting it. Eid Mubarak! 🌙" },
      { emoji: "🤡", title: "Access Denied!", msg: "You actually thought it was that easy? You're the real gift here." }
    ];

    function getYouTubeID(url) {
      const patterns = [/youtu\.be\/([^?&]+)/, /youtube\.com\/watch\?v=([^&]+)/];
      for (const p of patterns) {
        const m = url.match(p);
        if (m) return m[1];
      }
      return null;
    }

    let mediaItems = [];
    fetch('memes/list.json').then(r => r.json()).then(list => { mediaItems = list; }).catch(() => {});

    function getRandomMedia() {
      return mediaItems.length ? mediaItems[Math.floor(Math.random() * mediaItems.length)] : null;
    }

    // Canvas Background
    const starsCanvas = document.getElementById('stars');
    const sCtx = starsCanvas.getContext('2d');
    starsCanvas.width = window.innerWidth;
    starsCanvas.height = window.innerHeight;
    for (let i = 0; i < 100; i++) {
      sCtx.beginPath();
      sCtx.arc(Math.random() * starsCanvas.width, Math.random() * starsCanvas.height, 1, 0, Math.PI * 2);
      sCtx.fillStyle = "rgba(255,255,255,0.5)";
      sCtx.fill();
    }

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 10;
    const arc = (2 * Math.PI) / segments.length;
    let currentAngle = 0, spinning = false;

    function drawWheel(rotation) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      segments.forEach((seg, i) => {
        const start = rotation + i * arc, end = start + arc;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, end);
        ctx.fillStyle = seg.color;
        ctx.fill();
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(start + arc / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = 'white';
        ctx.font = 'bold 13px Segoe UI';
        ctx.fillText(seg.label, r - 15, 5);
        ctx.restore();
      });
    }

    drawWheel(0);

    const spinBtn = document.getElementById('spinBtn');
    const resultDiv = document.getElementById('result');
    const redeemBtn = document.getElementById('redeemBtn');

    spinBtn.addEventListener('click', () => {
      if (spinning) return;
      spinning = true;
      resultDiv.style.opacity = 0;
      redeemBtn.style.display = 'none';
      spinBtn.disabled = true;

      // PROBABILITY: 55% Zero, 45% Prize
      const zeroIndices = segments.map((s,i) => s.zero ? i : -1).filter(i => i >= 0);
      const prizeIndices = segments.map((s,i) => !s.zero ? i : -1).filter(i => i >= 0);
      const chosenIndex = Math.random() < 0.55 
        ? zeroIndices[Math.floor(Math.random() * zeroIndices.length)]
        : prizeIndices[Math.floor(Math.random() * prizeIndices.length)];

      const segmentMiddle = chosenIndex * arc + arc / 2;
      let targetAngle = (3 * Math.PI / 2 - segmentMiddle + 2 * Math.PI) % (2 * Math.PI);
      let delta = (targetAngle - (currentAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
      
      const extraSpins = Math.floor(6 + Math.random() * 4);
      const totalRotation = delta + (2 * Math.PI * extraSpins);

      const duration = 5000;
      const startTime = performance.now();
      const startAngle = currentAngle;

      function animate(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 4);
        currentAngle = startAngle + totalRotation * ease;
        drawWheel(currentAngle);
        if (progress < 1) requestAnimationFrame(animate);
        else {
          spinning = false;
          spinBtn.disabled = false;
          showResult(chosenIndex);
        }
      }
      requestAnimationFrame(animate);
    });

    function showResult(index) {
      const seg = segments[index];
      resultDiv.style.opacity = 1;
      if (seg.zero) {
        resultDiv.textContent = zeroMessages[Math.floor(Math.random() * zeroMessages.length)];
      } else {
        resultDiv.textContent = `🤩 You won ${seg.label}!! Lucky you!`;
        redeemBtn.style.display = 'inline-block';
      }
    }

    redeemBtn.addEventListener('click', () => {
      const text = redeemTexts[Math.floor(Math.random() * redeemTexts.length)];
      const media = getRandomMedia();
      document.getElementById('modalEmoji').textContent = text.emoji;
      document.getElementById('modalTitle').textContent = text.title;
      document.getElementById('modalMsg').textContent = text.msg;

      const memeImg = document.getElementById('modalMemeImg');
      const ytWrapper = document.getElementById('ytWrapper');
      const loading = document.getElementById('memeLoading');
      
      memeImg.style.display = 'none';
      ytWrapper.style.display = 'none';

      if (media && media.type === 'image') {
        loading.textContent = "Loading your prize...";
        memeImg.src = 'memes/' + media.file;
        memeImg.onload = () => { loading.textContent = ""; memeImg.style.display = 'block'; };
      }

      document.getElementById('modal').classList.add('show');
    });

    document.getElementById('closeModal').addEventListener('click', () => {
      document.getElementById('modal').classList.remove('show');
    });
  </script>
</body>
</html>
