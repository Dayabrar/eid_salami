<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eid Salami 🎉</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #1a0a2e, #16213e, #0f3460);
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      overflow-x: hidden;
    }
    h1 {
      font-size: clamp(2rem, 7vw, 3.5rem);
      margin-bottom: 0.3rem;
      text-align: center;
      background: linear-gradient(to right, #f7c948, #ff6b6b, #f7c948);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer { 0%,100% {filter:brightness(1);} 50% {filter:brightness(1.4);} }
    .subtitle { color:#aaa; margin-bottom:1.5rem; font-size:clamp(1rem,4vw,1.2rem); text-align:center; }
    .wheel-container { position:relative; width:min(90vw,340px); aspect-ratio:1/1; margin-bottom:1.5rem; }
    canvas { border-radius:50%; box-shadow:0 0 40px rgba(247,201,72,0.4); width:100%; height:100%; }
    .pointer { position:absolute; top:-20px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:16px solid transparent; border-right:16px solid transparent; border-top:36px solid #f7c948; filter:drop-shadow(0 3px 8px rgba(247,201,72,0.7)); z-index:10; }
    #spinBtn { padding:1rem 3rem; font-size:clamp(1.2rem,5vw,1.5rem); font-weight:bold; background:linear-gradient(135deg,#f7c948,#ff6b6b); border:none; border-radius:50px; cursor:pointer; color:white; box-shadow:0 6px 25px rgba(247,201,72,0.4); transition:transform 0.2s; }
    #spinBtn:hover { transform:scale(1.05); }
    #spinBtn:disabled { opacity:0.5; cursor:not-allowed; }
    #result { margin-top:1.5rem; font-size:clamp(1rem,4vw,1.2rem); text-align:center; min-height:3rem; max-width:90%; padding:0 1rem; color:#f7c948; font-style:italic; opacity:0; transition:opacity 0.5s; }
    #redeemBtn { display:none; margin-top:1rem; padding:0.8rem 2.5rem; font-size:clamp(1rem,4vw,1.2rem); font-weight:bold; background:linear-gradient(135deg,#43e97b,#38f9d7); border:none; border-radius:50px; cursor:pointer; color:#111; box-shadow:0 4px 15px rgba(67,233,123,0.4); transition:transform 0.2s; }
    #redeemBtn:hover { transform:scale(1.05); }

    /* Modal */
    #modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:100; align-items:center; justify-content:center; flex-direction:column; padding:1rem; }
    #modal.show { display:flex; }
    .modal-box { background:linear-gradient(135deg,#1a0a2e,#0f3460); border:2px solid #f7c948; border-radius:20px; padding:2rem 1.5rem; max-width:440px; width:100%; text-align:center; box-shadow:0 0 60px rgba(247,201,72,0.3); animation:popIn 0.4s ease; }
    @keyframes popIn { 0%{transform:scale(0.5);opacity:0;} 100%{transform:scale(1);opacity:1;} }
    .modal-emoji { font-size:3rem; margin-bottom:0.5rem; }
    .modal-title { font-size:1.4rem; font-weight:bold; color:#f7c948; margin-bottom:0.8rem; }
    .modal-msg { font-size:0.95rem; color:#ccc; line-height:1.5; margin-bottom:1.5rem; }
    #closeModal { padding:0.6rem 2rem; background:#f7c948; border:none; border-radius:50px; font-weight:bold; cursor:pointer; color:#111; font-size:1rem; }
    .stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:-1; }
  </style>
</head>
<body>

  <canvas class="stars" id="stars"></canvas>

  <h1>🎉 Eid Salami 🎉</h1>
  <p class="subtitle">Spin the wheel. Win big. (Spoiler: you won't.)</p>

  <div class="wheel-container">
    <div class="pointer"></div>
    <canvas id="wheelCanvas"></canvas>
  </div>

  <button id="spinBtn">🎰 SPIN!</button>
  <div id="result"></div>
  <button id="redeemBtn">💰 Redeem Now!</button>

  <!-- Modal (pure text, no external media) -->
  <div id="modal">
    <div class="modal-box">
      <div class="modal-emoji" id="modalEmoji"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-msg" id="modalMsg"></div>
      <button id="closeModal">Cry Again 😢</button>
    </div>
  </div>

  <script>
    // ========== EXACT AMOUNTS FROM THE IMAGE ==========
    const amounts = [
      1000, 500, 400, 300, 200, 100, 50, 40,
      30, 20, 10, 5, 4, 3, 2, 1
    ];

    // Build 16 segments with distinct colors (all winning amounts)
    const segments = amounts.map((amt, i) => {
      // Generate a rainbow of colors
      const hue = (i * 360 / amounts.length) % 360;
      return {
        label: amt + '₴',
        color: `hsl(${hue}, 70%, 55%)`,
        zero: false
      };
    });

    // ========== FUNNY REDEEM MESSAGES ==========
    const redeemTexts = [
      { emoji: "😂", title: "Nice Try, Brother!", msg: "The bank is currently closed. Permanently. For you specifically." },
      { emoji: "🤣", title: "Redeeming... Please Wait...", msg: "Error 404: Money Not Found. Have you tried crying?" },
      { emoji: "💀", title: "Transaction Failed!", msg: "Your request has been reviewed and respectfully yeeted into the void." },
      { emoji: "🫠", title: "Interesting Strategy!", msg: "We forwarded your request to our finance team. They laughed." },
      { emoji: "🙅", title: "Access Denied!", msg: "This feature is available to winners only. Come back never." },
      { emoji: "😭", title: "Payment Processing...", msg: "Just kidding. There's no payment. There never was. Eid Mubarak! 🌙" },
      { emoji: "🤡", title: "You Actually Clicked It!", msg: "The real Eid salami was the hope we destroyed along the way." },
      { emoji: "🎪", title: "Welcome to the Circus!", msg: "You're the main attraction. Zero is the ringmaster." },
      { emoji: "🪄", title: "Magic Trick!", msg: "Watch closely... your money disappeared! (It was never there.)" },
      { emoji: "📵", title: "Transaction Blocked!", msg: "Our system detected that you are you. Request rejected automatically." }
    ];

    // ========== STARS BACKGROUND ==========
    const starsCanvas = document.getElementById('stars');
    const sCtx = starsCanvas.getContext('2d');
    function drawStars() {
      starsCanvas.width = window.innerWidth;
      starsCanvas.height = window.innerHeight;
      sCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
      for (let i = 0; i < 150; i++) {
        sCtx.beginPath();
        sCtx.arc(Math.random() * starsCanvas.width, Math.random() * starsCanvas.height, Math.random() * 2, 0, Math.PI * 2);
        sCtx.fillStyle = `rgba(255,255,255,${Math.random() * 0.7 + 0.1})`;
        sCtx.fill();
      }
    }
    drawStars();
    window.addEventListener('resize', drawStars);

    // ========== WHEEL CANVAS ==========
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    let currentAngle = 0;
    let spinning = false;

    function drawWheel(rotation) {
      const size = canvas.width;
      const cx = size / 2;
      const cy = size / 2;
      const r = cx - 20;
      const arc = (2 * Math.PI) / segments.length;
      ctx.clearRect(0, 0, size, size);
      segments.forEach((seg, i) => {
        const start = rotation + i * arc;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, start + arc);
        ctx.fillStyle = seg.color;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Draw label
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(start + arc / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = 'white';
        ctx.font = 'bold 11px "Segoe UI", sans-serif';
        ctx.shadowBlur = 5;
        ctx.fillText(seg.label, r - 20, 6);
        ctx.restore();
      });
      // Center circle
      ctx.beginPath();
      ctx.arc(cx, cy, 28, 0, Math.PI * 2);
      ctx.fillStyle = '#1a0a2e';
      ctx.fill();
      ctx.strokeStyle = '#f7c948';
      ctx.lineWidth = 4;
      ctx.stroke();
    }

    function resizeCanvas() {
      const size = Math.min(window.innerWidth * 0.9, 340);
      canvas.width = canvas.height = size;
      drawWheel(currentAngle);
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ========== SPIN LOGIC ==========
    const spinBtn = document.getElementById('spinBtn');
    const resultDiv = document.getElementById('result');
    const redeemBtn = document.getElementById('redeemBtn');

    spinBtn.addEventListener('click', () => {
      if (spinning) return;
      spinning = true;
      resultDiv.style.opacity = 0;
      redeemBtn.style.display = 'none';
      spinBtn.disabled = true;

      // Pick a random segment (all are winning amounts)
      const chosenIndex = Math.floor(Math.random() * segments.length);
      const arc = (2 * Math.PI) / segments.length;
      // Target angle so that chosen segment's center aligns with top pointer (angle -PI/2)
      const targetAngle = -(chosenIndex * arc + arc / 2) + Math.PI / 2;
      const extraSpins = 5 + Math.random() * 5;
      const totalRotation = extraSpins * Math.PI * 2 + targetAngle - currentAngle;

      const duration = 4000 + Math.random() * 2000;
      const startTime = performance.now();
      const startAngle = currentAngle;

      function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

      function animate(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        currentAngle = startAngle + totalRotation * easeOut(progress);
        drawWheel(currentAngle % (Math.PI * 2));
        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          spinning = false;
          spinBtn.disabled = false;
          showResult(chosenIndex);
        }
      }
      requestAnimationFrame(animate);
    });

    function showResult(index) {
      const seg = segments[index];
      resultDiv.style.opacity = 1;
      resultDiv.textContent = `🎁 You landed on ${seg.label}!! Want to redeem it?`;
      redeemBtn.style.display = 'inline-block';
    }

    // ========== REDEEM BUTTON ==========
    redeemBtn.addEventListener('click', () => {
      const text = redeemTexts[Math.floor(Math.random() * redeemTexts.length)];
      document.getElementById('modalEmoji').textContent = text.emoji;
      document.getElementById('modalTitle').textContent = text.title;
      document.getElementById('modalMsg').textContent = text.msg;

      document.getElementById('modal').classList.add('show');
      redeemBtn.style.display = 'none';
    });

    document.getElementById('closeModal').addEventListener('click', () => {
      document.getElementById('modal').classList.remove('show');
    });
  </script>
</body>
</html>
