<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eid Salami 🎉</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: radial-gradient(circle at center, #1b1b2f, #000000);
      min-height: 100vh;
      font-family: 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      overflow: hidden;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 0.2rem;
      text-align: center;
      background: linear-gradient(45deg, #f7c948, #ffffff, #f7c948);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(247, 201, 72, 0.3);
    }

    .subtitle { color: #888; margin-bottom: 2rem; font-size: 1rem; text-align: center; max-width: 80%; }

    /* The Wheel Container with Glow */
    .wheel-outer {
      position: relative;
      padding: 12px;
      background: #222;
      border-radius: 50%;
      box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.1);
      border: 4px solid #333;
    }

    .wheel-container { position: relative; width: 340px; height: 340px; }

    canvas { border-radius: 50%; }

    .pointer {
      position: absolute;
      top: -15px; left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 35px solid #f7c948;
      filter: drop-shadow(0 0 10px #f7c948);
      z-index: 100;
    }

    #spinBtn {
      margin-top: 2rem;
      padding: 1rem 3rem;
      font-size: 1.3rem;
      font-weight: 900;
      text-transform: uppercase;
      background: linear-gradient(135deg, #f7c948, #ff6b6b);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: white;
      box-shadow: 0 5px 20px rgba(247, 201, 72, 0.4);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #spinBtn:hover:not(:disabled) { transform: scale(1.1); box-shadow: 0 8px 30px rgba(247, 201, 72, 0.6); }
    #spinBtn:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }

    #result {
      margin-top: 1.2rem;
      font-size: 1.1rem;
      font-style: italic;
      height: 2.5rem;
      text-align: center;
      color: #f7c948;
    }

    #redeemBtn {
      display: none;
      margin-top: 0.5rem;
      padding: 0.8rem 2.2rem;
      background: #43e97b;
      color: #000;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      animation: pulse 1.5s infinite;
    }

    .debt-counter { margin-top: 1rem; font-size: 0.8rem; color: #555; }

    /* Modal */
    #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    #modal.show { display: flex; }
    .modal-box { background: #111; border: 2px solid #f7c948; padding: 2rem; border-radius: 20px; text-align: center; max-width: 420px; width: 100%; box-shadow: 0 0 40px rgba(247,201,72,0.2); }
    
    #modalMemeImg { width: 100%; max-height: 250px; object-fit: contain; margin-bottom: 1rem; border-radius: 10px; display: none; }
    .yt-wrapper { display: none; position: relative; width: 100%; padding-bottom: 56.25%; margin-bottom: 1rem; border-radius: 10px; overflow: hidden; }
    .yt-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(67, 233, 123, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(67, 233, 123, 0); } 100% { box-shadow: 0 0 0 0 rgba(67, 233, 123, 0); } }
    .shake { animation: shake 0.4s ease-in-out; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

    #closeModal { margin-top: 1rem; padding: 10px 30px; border-radius: 20px; border: none; cursor:pointer; background:#f7c948; font-weight: bold; }
  </style>
</head>
<body>

  <h1>🎉 EID SALAMI 🎉</h1>
  <p class="subtitle" id="subText">Win big or lose with style. 🌙</p>

  <div class="wheel-outer" id="mainStage">
    <div class="pointer"></div>
    <div class="wheel-container">
      <canvas id="wheelCanvas" width="340" height="340"></canvas>
    </div>
  </div>

  <button id="spinBtn">🎰 SPIN FOR CASH</button>
  <div id="result"></div>
  <button id="redeemBtn">💰 CLAIM WINNINGS</button>
  
  <p class="debt-counter" id="debtText">Spins wasted: 0</p>

  <div id="modal">
    <div class="modal-box">
      <div id="modalEmoji" style="font-size: 3rem; margin-bottom: 0.5rem;"></div>
      <h2 style="color:#f7c948; margin-bottom: 1rem;" id="modalTitle"></h2>
      <div id="memeLoading" style="font-size: 0.8rem; color:#888;"></div>
      <img id="modalMemeImg" alt="meme" />
      <div class="yt-wrapper" id="ytWrapper">
        <iframe id="ytFrame" allow="autoplay; encrypted-media"></iframe>
      </div>
      <p id="modalMsg" style="margin-bottom: 1.5rem; color: #ccc; font-size: 0.95rem;"></p>
      <button id="closeModal">Cry & Try Again</button>
    </div>
  </div>

  <script>
    const segments = [
      { label: "0৳", color: "#e74c3c", zero: true },
      { label: "10৳", color: "#3498db", zero: false },
      { label: "0৳", color: "#e74c3c", zero: true },
      { label: "100৳", color: "#2ecc71", zero: false },
      { label: "0৳", color: "#e74c3c", zero: true },
      { label: "500৳", color: "#9b59b6", zero: false },
      { label: "0৳", color: "#e74c3c", zero: true },
      { label: "1000৳", color: "#f39c12", zero: false },
      { label: "0৳", color: "#e74c3c", zero: true },
      { label: "50৳", color: "#1abc9c", zero: false },
      { label: "0৳", color: "#e74c3c", zero: true },
      { label: "5000৳", color: "#e67e22", zero: false },
    ];

    const zeroRoasts = [
      "Zero! Even the air is more valuable than your luck. 💨",
      "Congratulations! You won... a lesson in humility. 🎓",
      "0৳. Your wallet just sighed in relief. 💸",
      "The wheel says: 'Go ask your Dad.' 👨‍🦳",
      "A perfect zero! You're consistent, I'll give you that. 🎯"
    ];

    const redeemFails = [
      { emoji: "🤡", title: "Honk Honk!", msg: "You actually thought we had money? We're an AI, we live on electricity and your tears." },
      { emoji: "🚫", title: "Access Denied", msg: "Our system detected that you haven't been nice this year. No Salami for you!" },
      { emoji: "📉", title: "Stock Market Crash", msg: "Just as you won, the value of the Taka hit zero. Unlucky!" }
    ];

    let spinCount = 0;
    let mediaItems = [];
    fetch('memes/list.json').then(r => r.json()).then(l => mediaItems = l).catch(() => {});

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const arc = (2 * Math.PI) / segments.length;
    let currentAngle = 0;

    function drawWheel() {
      ctx.clearRect(0,0,340,340);
      segments.forEach((s, i) => {
        const ang = currentAngle + i * arc;
        ctx.beginPath();
        ctx.fillStyle = s.color;
        ctx.moveTo(170, 170);
        ctx.arc(170, 170, 165, ang, ang + arc);
        ctx.fill();
        ctx.strokeStyle = "rgba(0,0,0,0.2)";
        ctx.stroke();

        ctx.save();
        ctx.translate(170, 170);
        ctx.rotate(ang + arc/2);
        ctx.textAlign = "right";
        ctx.fillStyle = "white";
        ctx.font = "bold 14px Arial";
        ctx.fillText(s.label, 155, 5);
        ctx.restore();
      });
    }

    drawWheel();

    document.getElementById('spinBtn').onclick = function() {
      spinCount++;
      this.disabled = true;
      document.getElementById('result').textContent = "";
      document.getElementById('redeemBtn').style.display = "none";
      document.getElementById('debtText').textContent = `Spins wasted: ${spinCount}`;

      // 55% Zero Probability
      const isZero = Math.random() < 0.55;
      const pool = segments.map((s,i) => s.zero === isZero ? i : -1).filter(i => i !== -1);
      const chosen = pool[Math.floor(Math.random() * pool.length)];

      // Near-Miss Logic (lands closer to the edges of the segment)
      const offset = isZero ? (Math.random() < 0.5 ? 0.1 : 0.9) : 0.5;
      const targetRot = (3 * Math.PI / 2) - (chosen * arc + (arc * offset));
      const finalRot = targetRot + (Math.PI * 2 * 8);

      const start = performance.now();
      const duration = 4500;

      function frame(now) {
        const p = Math.min((now - start) / duration, 1);
        const ease = 1 - Math.pow(1 - p, 4);
        currentAngle = ease * finalRot;
        drawWheel();
        if (p < 1) requestAnimationFrame(frame);
        else {
          document.getElementById('spinBtn').disabled = false;
          const res = segments[chosen];
          if (res.zero) {
            document.getElementById('mainStage').classList.add('shake');
            setTimeout(() => document.getElementById('mainStage').classList.remove('shake'), 400);
            document.getElementById('result').textContent = zeroRoasts[Math.floor(Math.random() * zeroRoasts.length)];
            document.getElementById('result').style.color = "#ff6b6b";
          } else {
            document.getElementById('result').textContent = `💸 Landed on ${res.label}! 💸`;
            document.getElementById('result').style.color = "#43e97b";
            document.getElementById('redeemBtn').style.display = "inline-block";
          }
        }
      }
      requestAnimationFrame(frame);
    };

    document.getElementById('redeemBtn').onclick = function() {
      const fail = redeemFails[Math.floor(Math.random() * redeemFails.length)];
      const media = mediaItems.length ? mediaItems[Math.floor(Math.random() * mediaItems.length)] : null;

      document.getElementById('modalEmoji').textContent = fail.emoji;
      document.getElementById('modalTitle').textContent = fail.title;
      document.getElementById('modalMsg').textContent = fail.msg;
      
      const img = document.getElementById('modalMemeImg');
      const yt = document.getElementById('ytWrapper');
      img.style.display = 'none';
      yt.style.display = 'none';

      if (media) {
        if (media.type === 'image') {
          img.src = 'memes/' + media.file;
          img.style.display = 'block';
        } else if (media.type === 'youtube') {
          const vid = media.url.split('v=')[1] || media.url.split('/').pop();
          document.getElementById('ytFrame').src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
          yt.style.display = 'block';
        }
      }
      document.getElementById('modal').classList.add('show');
    };

    document.getElementById('closeModal').onclick = () => {
      document.getElementById('ytFrame').src = "";
      document.getElementById('modal').classList.remove('show');
    };
  </script>
</body>
</html>
